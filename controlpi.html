<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Remote Control</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px; 
            margin: 2em auto; 
            padding: 0 1em;
            background-color: #f8f9fa;
            color: #212529;
        }
        h1 { 
            color: #343a40;
            text-align: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .form-group { 
            margin-bottom: 1.25em; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5em; 
            font-weight: 600; 
            color: #495057;
        }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            font-size: 1rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 1em;
        }
        input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
        .button-group {
            display: flex;
            gap: 1em;
            margin-top: 1.5em;
        }
        button { 
            flex-grow: 1;
            background-color: #007bff; 
            color: white; 
            padding: 12px 15px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #stopButton {
            background-color: #dc3545;
        }
        #stopButton:hover {
            background-color: #c82333;
        }
        #statusMessage {
            margin-top: 1.5em;
            padding: 1em;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
            display: none; /* Hidden by default */
        }
        .status-success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>

    <h1>SDR Remote Control</h1>

    <div class="form-container">
        <div class="form-group">
            <label for="secretKey">Secret Key</label>
            <input type="password" id="secretKey" placeholder="Enter your secret key here" required>
        </div>
        <hr style="border: 0; border-top: 1px solid #e9ecef; margin: 2em 0;">
        
        <div class="form-group">
            <label for="blobName">Blob Name (used as file in GCS)</label>
            <input type="text" id="blobName" value="my-recording-session" required>
        </div>
        
        <div class="form-group">
            <label for="duration">Recording Duration (seconds)</label>
            <input type="number" id="duration" value="300" min="1" required>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="overwrite">
            <label for="overwrite">Overwrite Flag (behavior defined by Pi)</label>
        </div>

        <div class="button-group">
            <button id="startButton">Start Recording</button>
            <button id="stopButton">Stop Recording</button>
        </div>

        <div id="statusMessage"></div>
    </div>

    <script>
        const CLOUD_FUNCTION_URL = "https://trigger-sdr-108359996380.us-west1.run.app";
        const SECRET_KEY_STORAGE_ID = "sdrSecretKey";

        const secretKeyInput = document.getElementById('secretKey');
        const blobNameInput = document.getElementById('blobName');
        const durationInput = document.getElementById('duration');
        const overwriteInput = document.getElementById('overwrite');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const statusMessageDiv = document.getElementById('statusMessage');

        secretKeyInput.value = localStorage.getItem(SECRET_KEY_STORAGE_ID) || '';
        secretKeyInput.addEventListener('input', () => {
            localStorage.setItem(SECRET_KEY_STORAGE_ID, secretKeyInput.value);
        });

        async function sendCommand(params) {
            const secret = secretKeyInput.value.trim();
            if (!secret) {
                alert('Please enter your Secret Key.');
                return;
            }

            statusMessageDiv.textContent = 'Sending command...';
            statusMessageDiv.className = '';

            const query = new URLSearchParams(params).toString();
            const finalUrl = `${CLOUD_FUNCTION_URL}/${secret}?${query}`;

            console.log('Calling URL:', finalUrl);

            try {
                const response = await fetch(finalUrl);
                const responseText = await response.text();

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} - ${responseText}`);
                }

                statusMessageDiv.textContent = responseText;
                statusMessageDiv.classList.add('status-success');

            } catch (error) {
                console.error('Command failed:', error);
                statusMessageDiv.textContent = `Error: ${error.message}`;
                statusMessageDiv.classList.add('status-error');
            }
        }

        startButton.addEventListener('click', () => {
            const params = {
                action: 'start',
                blob: blobNameInput.value.trim(),
                duration: durationInput.value,
                overwrite: overwriteInput.checked.toString()
            };
            
            if (!params.blob) {
                alert('Please enter a Session Name.');
                return;
            }

            sendCommand(params);
        });

        stopButton.addEventListener('click', () => {
            const params = {
                action: 'stop'
            };
            sendCommand(params);
        });
    </script>

</body>
</html>
